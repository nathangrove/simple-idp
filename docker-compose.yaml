# Use root/example as user/password credentials
version: '3.1'

services:

  app:
    image: node:16
    working_dir: /app
    ports:
      - 5000:5000
    volumes:
      - ./:/app
    command: "npm run dev"

  mongo:
    image: mongo:4.2
    restart: always
    volumes:
      - ./mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: toor

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 5001:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: toor
      ME_CONFIG_MONGODB_URL: mongodb://root:toor@mongo:27017/

      